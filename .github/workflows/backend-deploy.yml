name: Deploy Backend & Microservices to EC2

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'microservices/**'
      - 'prisma/**'
      - 'docker-compose.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Execute Deployment Script via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST_IP }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Tell bash to exit immediately if any command fails
            set -e
            
            # Navigate to the exact repository folder name on the EC2 instance
            cd ~/ai-content-detector
            
            # Pull latest changes
            git pull origin main
            
            # Install Node dependencies and regenerate Prisma schema
            npm install
            npx prisma generate
            
            # Compile TypeScript to JavaScript
            npm run build
            
            # Restart Express API via PM2
            pm2 restart backend || pm2 start dist/server.js --name backend
            
            # Rebuild and restart Docker containers in detached mode
            docker compose up --build -d
